name: Build and Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
          
      - name: Restore
        run: dotnet restore GovAdmin.sln
        
      - name: Build
        run: dotnet build GovAdmin.sln --configuration Release --no-restore
        
      - name: Publish
        run: dotnet publish src/GovAdmin.UI/GovAdmin.UI.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o ./publish
        
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GovAdmin-App
          path: publish/
