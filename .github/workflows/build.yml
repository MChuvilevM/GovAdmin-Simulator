jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
          # Кэширование пакетов NuGet ускоряет этап Restore в 2-3 раза
          cache: true
          cache-dependency-path: '**/packages.lock.json' 
          
      - name: Restore
        run: dotnet restore
        
      - name: Build
        # Убираем --no-restore, если Restore идет отдельно, но добавляем --no-incremental для надежности
        run: dotnet build --configuration Release --no-restore
        
      # Если тесты проходят долго, лучше запускать их параллельно или на отдельном джобе
      - name: Test
        run: dotnet test --no-build --verbosity quiet
          
      - name: Publish
        # Исключаем создание PDB (символов отладки) — это экономит место и время
        # Добавляем -p:Optimize=true для ускорения работы самого exe
        run: >
          dotnet publish src/GovAdmin.UI/GovAdmin.UI.csproj 
          -c Release 
          -r win-x64 
          --self-contained true 
          -p:PublishSingleFile=true 
          -p:IncludeNativeLibrariesForSelfExtract=true 
          -p:DebugType=None 
          -p:DebugSymbols=false 
          -p:Optimize=true 
          --output ./publish
        
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GovAdmin-App
          path: ./publish/GovAdmin.UI.exe
          # Загружаем только готовый exe, а не всю папку — это мгновенно
          retention-days: 7
