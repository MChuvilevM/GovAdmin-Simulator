name: Build and Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
          
      - name: Restore
        run: dotnet restore
        
      - name: Build
        run: dotnet build --configuration Release --no-restore
        
      - name: Test
        run: dotnet test --no-build --verbosity normal
          
      - name: Publish
        # Указываем конкретный проект, чтобы избежать проблем с выводом при сборке решения
        run: dotnet publish GovAdmin.UI/GovAdmin.UI.csproj -c Release -p:PublishSingleFile=false --self-contained true -r win-x64 --output "${{ github.workspace }}/publish"
        
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GovAdmin-App
          path: publish/
